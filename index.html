<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>بيتي | متجر المواد المنزلية</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Header -->

    <header>

        <div class="logo">
            🏠 <span>بيتي</span>
        </div>

        <nav>

            <a href="#">الرئيسية</a>

            <a href="#">المنتجات</a>

            <a href="#">الأقسام</a>

            <a href="#">العروض</a>

            <a href="#">اتصل بنا</a>

        </nav>

        <div class="icons">

            <i class="fa-solid fa-magnifying-glass"></i>

            <i class="fa-regular fa-heart"></i>

            <i class="fa-solid fa-cart-shopping"></i>

        </div>

    </header>

    <!-- Hero -->

    <section class="hero">

        <div class="hero-text">

            <h1>كل ما يحتاجه منزلك في مكان واحد</h1>

            <p>

                اكتشف أفضل المنتجات المنزلية بأفضل الأسعار وجودة عالية.

            </p>

            <button>ابدأ التسوق</button>

        </div>

    </section>

    <!-- Categories -->

    <section class="categories">

        <h2>الأقسام</h2>

        <div class="category-box">

            <div class="item">🛋️<h3>الأثاث</h3></div>

            <div class="item">🍽️<h3>المطبخ</h3></div>

            <div class="item">💡<h3>الإنارة</h3></div>

            <div class="item">🪴<h3>الديكور</h3></div>

            <div class="item">🧺<h3>التنظيف</h3></div>

            <div class="item">🛏️<h3>غرف النوم</h3></div>

        </div>

    </section>

    <!-- منتجات -->

    <section class="products">

        <h2>أحدث المنتجات</h2>

        <div class="product-grid">

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <p>© 2026 جميع الحقوق محفوظة - متجر بيتي</p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
